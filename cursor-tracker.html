<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Трекер курсора</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

function App() {
  const [pos, setPos] = useState({ x: 0, y: 0 });

  const handleMouseMove = useCallback((e) => {
    setPos({ x: e.clientX, y: e.clientY });
  }, []);

  useEffect(() => {
    window.addEventListener('mousemove', handleMouseMove);
    return () => window.removeEventListener('mousemove', handleMouseMove);
  }, [handleMouseMove]);

  const w = window.innerWidth;
  const h = window.innerHeight;

  const hue = Math.round((pos.x / w) * 360);
  const lightness = Math.round(30 + (pos.y / h) * 40);
  const saturation = 70;

  const bg = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
  const textColor = lightness > 50 ? '#1a1a1a' : '#f0f0f0';

  const xPercent = ((pos.x / w) * 100).toFixed(1);
  const yPercent = ((pos.y / h) * 100).toFixed(1);

  return (
    <div
      style={{
        width: '100vw',
        height: '100vh',
        background: bg,
        transition: 'background 0.05s ease',
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        justifyContent: 'center',
        userSelect: 'none',
        cursor: 'crosshair',
      }}
    >
      <div style={{
        fontFamily: "'Courier New', monospace",
        color: textColor,
        textAlign: 'center',
        padding: '40px 60px',
        borderRadius: '20px',
        background: 'rgba(255,255,255,0.12)',
        backdropFilter: 'blur(10px)',
        border: '1px solid rgba(255,255,255,0.2)',
        boxShadow: '0 8px 32px rgba(0,0,0,0.15)',
      }}>
        <div style={{ fontSize: '13px', letterSpacing: '0.15em', textTransform: 'uppercase', opacity: 0.7, marginBottom: '24px' }}>
          Позиция курсора
        </div>

        <div style={{ display: 'flex', gap: '48px', justifyContent: 'center', marginBottom: '28px' }}>
          <div>
            <div style={{ fontSize: '11px', opacity: 0.6, marginBottom: '6px', letterSpacing: '0.1em' }}>X (px)</div>
            <div style={{ fontSize: '56px', fontWeight: 'bold', lineHeight: 1, minWidth: '100px' }}>
              {pos.x}
            </div>
          </div>
          <div style={{ width: '1px', background: 'currentColor', opacity: 0.2 }} />
          <div>
            <div style={{ fontSize: '11px', opacity: 0.6, marginBottom: '6px', letterSpacing: '0.1em' }}>Y (px)</div>
            <div style={{ fontSize: '56px', fontWeight: 'bold', lineHeight: 1, minWidth: '100px' }}>
              {pos.y}
            </div>
          </div>
        </div>

        <div style={{ display: 'flex', gap: '32px', justifyContent: 'center', fontSize: '13px', opacity: 0.65, marginBottom: '24px' }}>
          <span>{xPercent}% по ширине</span>
          <span>·</span>
          <span>{yPercent}% по высоте</span>
        </div>

        <div style={{
          fontSize: '12px',
          opacity: 0.6,
          fontFamily: 'sans-serif',
          letterSpacing: '0.05em',
        }}>
          hsl({hue}°, {saturation}%, {lightness}%)
        </div>
      </div>

      <div style={{
        position: 'fixed',
        left: pos.x,
        top: pos.y,
        width: '12px',
        height: '12px',
        borderRadius: '50%',
        background: textColor,
        transform: 'translate(-50%, -50%)',
        pointerEvents: 'none',
        opacity: 0.6,
        transition: 'background 0.1s',
        boxShadow: `0 0 0 3px ${bg}`,
      }} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
